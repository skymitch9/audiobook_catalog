<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("ab_theme")==="light")document.documentElement.classList.add("light");</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Community - Audiobook Catalog</title>
<style>
:root{
  --bg:#0a0a12; --bg-2:#12121f;
  --text:#e8e6e3; --muted:#8a8f98;
  --border:#2a2a3a;
  --neon-yellow:#fcee0a;
  --neon-cyan:#05d9e8;
  --neon-magenta:#ff2a6d;
}
*{box-sizing:border-box}
body{
  margin:0; padding:20px;
  font-family:'Rajdhani','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(252,238,10,.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(5,217,232,.03) 0%, transparent 50%);
  min-height:100vh;
}
#wrap{max-width:900px;margin:0 auto}
h1{
  color:var(--neon-yellow);text-transform:uppercase;letter-spacing:2px;
  text-shadow:0 0 10px rgba(252,238,10,.3);margin:0 0 8px;
}
.nav-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.nav-link{
  display:inline-block;padding:8px 14px;background:var(--bg-2);color:var(--neon-cyan);
  text-decoration:none;border:1px solid var(--border);font-weight:700;font-size:.85em;
  text-transform:uppercase;letter-spacing:.5px;transition:all .2s;
}
.nav-link:hover{border-color:var(--neon-cyan);box-shadow:0 0 8px rgba(5,217,232,.2)}
#search-input{
  flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);
  background:var(--bg-2);color:var(--text);font-size:.9em;
  font-family:'Share Tech Mono',monospace;
}
#search-input:focus{outline:none;border-color:var(--neon-cyan)}
.clubs-banner{
  display:flex;align-items:center;gap:16px;margin-top:16px;padding:20px 24px;
  background:var(--bg-2);border:1px solid var(--neon-cyan);text-decoration:none;color:var(--text);
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
  transition:box-shadow .2s;
}
.clubs-banner:hover{box-shadow:0 0 16px rgba(5,217,232,.25)}
.cb-icon{font-size:2.4em}
.cb-title{display:block;font-size:1.3em;font-weight:700;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1.5px}
#cb-new-badge{
  padding:2px 9px;border:1px solid var(--neon-magenta);color:var(--neon-magenta);
  font-size:.6em;letter-spacing:.5px;vertical-align:middle;font-family:'Share Tech Mono',monospace;
}
.cb-sub{display:block;color:var(--muted);font-size:.92em;margin-top:2px}
.cb-arrow{margin-left:auto;font-size:1.8em;color:var(--neon-cyan)}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:16px}
.user-card{
  background:var(--bg-2);border:1px solid var(--border);padding:20px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:border-color .2s; cursor:pointer;
}
.user-card:hover{border-color:var(--neon-magenta)}
.user-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.user-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--neon-cyan);object-fit:cover}
.user-name{font-weight:700;font-size:1.2em;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:.5px}
.user-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.stat-box{background:var(--bg);border:1px solid var(--border);padding:8px;text-align:center}
.stat-val{font-size:1.3em;font-weight:700;color:var(--neon-yellow);font-family:'Share Tech Mono',monospace}
.stat-lbl{font-size:.7em;color:var(--muted);text-transform:uppercase}
.user-reading{font-size:.9em;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:8px}
.user-reading strong{color:var(--neon-magenta)}
.user-reading img{width:36px;height:auto;border-radius:2px;border:1px solid var(--border)}
.user-favs{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.user-favs img{width:44px;height:auto;border-radius:2px;border:1px solid var(--border)}
.fav-chip{
  display:inline-block;padding:3px 8px;margin:2px;font-size:.8em;
  background:var(--bg);border:1px solid var(--border);color:var(--text);
}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.empty{text-align:center;padding:30px;color:var(--muted)}
#user-count{color:var(--muted);font-size:.85em;font-family:'Share Tech Mono',monospace}
/* User modal */
#user-modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);z-index:9999;padding:20px;backdrop-filter:blur(4px);
}
#user-modal.open{display:flex}
.user-modal-panel{
  background:var(--bg-2);border:1px solid var(--neon-cyan);
  width:min(520px,92vw);padding:32px;position:relative;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
}
.user-modal-close{
  position:absolute;top:12px;right:12px;background:none;border:1px solid var(--neon-magenta);
  color:var(--neon-magenta);width:30px;height:30px;cursor:pointer;font-weight:bold;
}
.user-modal-close:hover{background:var(--neon-magenta);color:#fff}
.um-avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--neon-cyan);object-fit:cover}
.um-name{font-size:1.6em;font-weight:700;color:var(--neon-cyan);text-transform:uppercase;letter-spacing:1px}
.um-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.um-stat{background:var(--bg);border:1px solid var(--border);padding:14px;text-align:center}
.um-stat-val{font-size:1.8em;font-weight:700;color:var(--neon-yellow);font-family:'Share Tech Mono',monospace}
.um-stat-lbl{font-size:.75em;color:var(--muted);text-transform:uppercase}
.um-section{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.um-section-title{font-size:.85em;color:var(--neon-magenta);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.um-favs{display:flex;gap:8px;flex-wrap:wrap}
.um-years{display:flex;gap:8px;flex-wrap:wrap}
.um-year{
  padding:6px 12px;background:var(--bg);border:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;font-size:.9em;color:var(--neon-yellow);
}
.um-year strong{color:var(--muted);font-weight:400;margin-right:6px}
.um-clubs{display:flex;flex-direction:column;gap:8px}
.um-club{
  display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);
  border:1px solid var(--border);color:var(--neon-cyan);text-decoration:none;font-weight:700;
}
.um-club:hover{border-color:var(--neon-cyan)}
.um-club img{width:32px;height:auto;border:1px solid var(--border)}
.um-club-emoji{font-size:1.4em}
.um-favs img{width:64px;height:auto;border-radius:3px;border:1px solid var(--border)}
@media(max-width:600px){
  body{padding:10px}
  .nav-row{flex-direction:column;align-items:stretch}
  .nav-link{text-align:center;padding:12px;min-height:44px}
  #search-input{width:100%}
  .user-grid{grid-template-columns:1fr}
  .user-card{clip-path:none}
  .user-modal-panel{width:95vw;clip-path:none;padding:16px}
}

/* Sign-in / user chip (shared identity bar) */
#identity-bar{margin-left:auto}
.identity-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.identity-bar__greeting{font-weight:700;color:var(--neon-cyan,#05d9e8)}
.identity-bar__google-btn{
  display:inline-flex;align-items:center;padding:8px 14px;border:1px solid var(--border,#2a2a3a);
  background:var(--bg-2,#12121f);color:var(--text,#e8e6e3);font-weight:700;font-size:.85em;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.identity-bar__google-btn:hover{border-color:var(--neon-cyan,#05d9e8)}
.identity-bar__google-btn:disabled{opacity:.6;cursor:wait}
.identity-bar__logout-btn{
  background:none;border:1px solid var(--border,#2a2a3a);color:var(--muted,#8a8f98);cursor:pointer;
  font-size:.75em;padding:4px 10px;font-family:inherit;text-transform:uppercase;letter-spacing:.5px;
}
.identity-bar__logout-btn:hover{border-color:var(--neon-magenta,#ff2a6d);color:var(--neon-magenta,#ff2a6d)}

.nav-link.active{border-color:var(--neon-cyan,#05d9e8);color:var(--neon-yellow,#fcee0a)}

/* Light theme: html.light overrides the palette vars site-wide */
html.light{
  --bg:#eef0f5; --bg-2:#ffffff; --text:#16161e; --muted:#5c6270; --border:#c9cdd9;
  --neon-yellow:#9a7b00; --neon-cyan:#00798f; --neon-magenta:#c31e58;
}
html.light body{background-image:none}
</style>
</head>
<body>
<div id="wrap">
  <h1>Community</h1>
  <div class="nav-row">
    <a href="index.html" class="nav-link">Catalog</a>
    <a href="community.html" class="nav-link active">Community</a>
    <a href="clubs.html" class="nav-link">Clubs</a>
    <a href="stats.html" class="nav-link">Stats</a>
    <a href="guess-game.html" class="nav-link">Game</a>
    <input id="search-input" type="search" placeholder="Search users..." />
    <span id="user-count"></span>
    <div id="identity-bar"></div>
  </div>
  <a href="clubs.html" class="clubs-banner">
    <span class="cb-icon">📚</span>
    <span class="cb-text">
      <span class="cb-title">Book Clubs <span id="cb-new-badge" style="display:none"></span></span>
      <span class="cb-sub" id="clubs-banner-sub">Read together, chapter by chapter — spoiler-safe discussions, votes, and quotes</span>
    </span>
    <span class="cb-arrow">→</span>
  </a>

  <div id="user-grid" class="user-grid">
    <div class="loading">Loading community...</div>
  </div>
</div>

<!-- User Profile Modal -->
<div id="user-modal">
  <div class="user-modal-panel">
    <button class="user-modal-close" id="user-modal-close">X</button>
    <div id="user-modal-content"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { col } from './fb-env.js';
  import { getSession, slugifyName} from './identity.js';
  import { mountAccountModal } from './account-modal.js';
  import { clubActivity } from './club-notify.js';

  // "N new" on the Clubs banner: unread club posts for the signed-in user
  // setTimeout defers past the module body so initializeApp below has run.
  setTimeout(async () => {
    try {
      const s = getSession();
      if (!s) return;
      const activity = await clubActivity(getFirestore(), slugifyName(s.displayName));
      const total = activity.reduce((sum, a) => sum + a.newCount, 0);
      const badge = document.getElementById('cb-new-badge');
      if (badge && total > 0) { badge.textContent = `${total} new`; badge.style.display = 'inline-block'; }
    } catch (e) { console.warn('[notify] banner badge failed:', e); }
  }, 0);

  const firebaseConfig = {
    apiKey: "AIzaSyDgAblkxzVxl7nFbd7jXOo6PpuNPsJw11Y",
    authDomain: "audiobook-catalog.firebaseapp.com",
    projectId: "audiobook-catalog",
    storageBucket: "audiobook-catalog.firebasestorage.app",
    messagingSenderId: "68492219785",
    appId: "1:68492219785:web:7cbe57dda8712377f0bd58"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  mountAccountModal(db, app, document.getElementById('identity-bar'));

  const grid = document.getElementById('user-grid');
  const searchInput = document.getElementById('search-input');
  const userCountEl = document.getElementById('user-count');

  let allUsers = [];

  async function loadCommunity() {
    try {
      // Fetch profiles and reviews in parallel
      const [profilesSnap, reviewsSnap, readingListsSnap, clubsSnap] = await Promise.all([
        getDocs(collection(db, col('profiles'))),
        getDocs(collection(db, col('reviews'))),
        getDocs(collection(db, col('readingLists'))),
        getDocs(collection(db, col('clubs')))
      ]);

      // Clubs per user (memberSlugs are lowercased display names)
      const clubsByUser = {};
      let clubCount = 0;
      clubsSnap.docs.forEach(d => {
        const data = d.data();
        clubCount++;
        (data.memberSlugs || []).forEach(slug => {
          if (!clubsByUser[slug]) clubsByUser[slug] = [];
          clubsByUser[slug].push({ id: d.id, name: data.name || d.id, cover: data.avatarCoverHref || '', emoji: data.emoji || '📚' });
        });
      });
      const bannerSub = document.getElementById('clubs-banner-sub');
      if (clubCount > 0) {
        bannerSub.textContent = `${clubCount} club${clubCount !== 1 ? 's' : ''} reading right now — spoiler-safe chapter discussions, votes, and quotes`;
      }

      // Build reading list stats per user (TBR only)
      const readingStats = {};
      readingListsSnap.docs.forEach(d => {
        const data = d.data();
        const name = (data.displayName || '').toLowerCase();
        if (!name) return;
        if (!readingStats[name]) readingStats[name] = { tbr: 0 };
        if (data.status === 'tbr') readingStats[name].tbr++;
      });

      // Build review stats per user (+ distinct books reviewed per year)
      const reviewStats = {};
      const thisYear = new Date().getFullYear();
      reviewsSnap.docs.forEach(d => {
        const data = d.data();
        const name = (data.displayName || '').toLowerCase();
        if (!name) return;
        if (!reviewStats[name]) reviewStats[name] = { count: 0, totalRating: 0, yearBooks: {} };
        reviewStats[name].count++;
        reviewStats[name].totalRating += data.rating || 0;
        try {
          const y = data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().getFullYear() : null;
          if (y !== null && data.bookId) {
            if (!reviewStats[name].yearBooks[y]) reviewStats[name].yearBooks[y] = new Set();
            reviewStats[name].yearBooks[y].add(data.bookId);
          }
        } catch (e) { /* old reviews without timestamps */ }
      });
      const yearsFor = (stats) => Object.entries(stats.yearBooks || {})
        .map(([y, set]) => ({ year: y, books: set.size }))
        .sort((a, b) => b.year - a.year);
      const readThisYear = (stats) => (stats.yearBooks && stats.yearBooks[thisYear]) ? stats.yearBooks[thisYear].size : 0;

      // Build user list from profiles
      allUsers = [];
      profilesSnap.docs.forEach(d => {
        const data = d.data();
        const nameLower = (data.displayName || '').toLowerCase();
        const stats = reviewStats[nameLower] || { count: 0, totalRating: 0 };
        allUsers.push({
          displayName: data.displayName || d.id,
          clubs: clubsByUser[nameLower] || [],
          readYears: yearsFor(stats),
          readThisYear: readThisYear(stats),
          photoURL: data.photoURL || '',
          currentlyReading: data.currentlyReading || '',
          currentlyReadingCover: data.currentlyReadingCover || '',
          favorites: data.favorites || [],
          favCovers: data.favCovers || {},
          reviewCount: stats.count,
          avgRating: stats.count > 0 ? (stats.totalRating / stats.count).toFixed(1) : '—',
          gameBestStreak: data.gameBestStreak || 0,
          gameAccuracy: data.gameAccuracy || 0,
          booksTbr: (readingStats[nameLower] || {}).tbr || 0,
        });
      });

      // Also add users who have reviews but no profile
      reviewsSnap.docs.forEach(d => {
        const data = d.data();
        const nameLower = (data.displayName || '').toLowerCase();
        if (!allUsers.find(u => u.displayName.toLowerCase() === nameLower)) {
          const stats = reviewStats[nameLower] || { count: 0, totalRating: 0 };
          allUsers.push({
            displayName: data.displayName,
            clubs: clubsByUser[nameLower] || [],
            readYears: yearsFor(stats),
            readThisYear: readThisYear(stats),
            photoURL: '',
            currentlyReading: '',
            currentlyReadingCover: '',
            favorites: [],
            favCovers: {},
            reviewCount: stats.count,
            avgRating: stats.count > 0 ? (stats.totalRating / stats.count).toFixed(1) : '—',
            gameBestStreak: 0,
            gameAccuracy: 0,
            booksTbr: (readingStats[nameLower] || {}).tbr || 0,
          });
        }
      });

      // Sort by review count descending
      allUsers.sort((a, b) => b.reviewCount - a.reviewCount);

      renderUsers(allUsers);
    } catch (e) {
      grid.innerHTML = '<div class="empty">Failed to load community data.</div>';
      console.error(e);
    }
  }

  function renderUsers(users) {
    userCountEl.textContent = `${users.length} member${users.length !== 1 ? 's' : ''}`;

    if (users.length === 0) {
      grid.innerHTML = '<div class="empty">No users found.</div>';
      return;
    }

    grid.innerHTML = users.map(u => {
      const avatar = u.photoURL
        ? `<img class="user-avatar" src="${u.photoURL}" alt="">`
        : `<div class="user-avatar" style="display:flex;align-items:center;justify-content:center;background:var(--border);font-size:1.2em">${u.displayName.charAt(0).toUpperCase()}</div>`;

      const reading = u.currentlyReading
        ? `<div class="user-reading"><strong>Reading:</strong> <span style="display:inline-flex;align-items:center;gap:6px">${u.currentlyReadingCover ? '<a href="index.html#q=' + encodeURIComponent(u.currentlyReading) + '"><img src="' + u.currentlyReadingCover + '"></a>' : ''}${u.currentlyReading}</span></div>`
        : '';

      const favs = u.favorites.length > 0
        ? `<div class="user-favs">${u.favorites.map(f => {
            const cover = u.favCovers[f] || '';
            return cover
              ? '<a href="index.html#q=' + encodeURIComponent(f) + '"><img src="' + cover + '" title="' + f + '"></a>'
              : '<span class="fav-chip">' + f + '</span>';
          }).join('')}</div>`
        : '';

      return `
        <div class="user-card" data-name="${u.displayName.toLowerCase()}">
          <div class="user-header">
            ${avatar}
            <span class="user-name">${u.displayName}</span>
          </div>
          <div class="user-stats">
            <div class="stat-box"><div class="stat-val">${u.reviewCount}</div><div class="stat-lbl">Reviews</div></div>
            <div class="stat-box"><div class="stat-val">${u.avgRating}</div><div class="stat-lbl">Avg Rating</div></div>
            <div class="stat-box"><div class="stat-val">${u.gameBestStreak}</div><div class="stat-lbl">Best Streak</div></div>
            <div class="stat-box"><div class="stat-val">${u.gameAccuracy}%</div><div class="stat-lbl">Game Acc</div></div>
            <div class="stat-box"><a href="index.html#list=tbr&user=${encodeURIComponent(u.displayName)}" style="text-decoration:none"><div class="stat-val">${u.booksTbr}</div><div class="stat-lbl">TBR</div></a></div>
            <div class="stat-box"><div class="stat-val">${u.clubs.length}</div><div class="stat-lbl">Clubs</div></div>
            <div class="stat-box"><div class="stat-val">${u.readThisYear}</div><div class="stat-lbl">Read ${String(new Date().getFullYear()).slice(2)}'</div></div>
          </div>
          ${reading}
          ${favs}
        </div>`;
    }).join('');
  }

  // Search filter
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) {
      renderUsers(allUsers);
      return;
    }
    const filtered = allUsers.filter(u =>
      u.displayName.toLowerCase().includes(q) ||
      u.currentlyReading.toLowerCase().includes(q) ||
      u.favorites.some(f => f.toLowerCase().includes(q))
    );
    renderUsers(filtered);
  });

  // User modal
  const userModal = document.getElementById('user-modal');
  const userModalContent = document.getElementById('user-modal-content');
  document.getElementById('user-modal-close').addEventListener('click', () => userModal.classList.remove('open'));
  userModal.addEventListener('click', (e) => { if (e.target === userModal) userModal.classList.remove('open'); });

  function openUserModal(user) {
    const avatar = user.photoURL
      ? `<img class="um-avatar" src="${user.photoURL}" alt="">`
      : `<div class="um-avatar" style="display:flex;align-items:center;justify-content:center;background:var(--border);font-size:1.6em">${user.displayName.charAt(0).toUpperCase()}</div>`;

    const reading = user.currentlyReading
      ? `<div class="um-section">
          <div class="um-section-title">Currently Reading</div>
          <div style="display:flex;align-items:center;gap:12px">
            ${user.currentlyReadingCover ? '<a href="index.html#q=' + encodeURIComponent(user.currentlyReading) + '"><img src="' + user.currentlyReadingCover + '" style="width:56px;height:auto;border-radius:3px;border:1px solid var(--border)"></a>' : ''}
            <span style="font-size:1.05em">${user.currentlyReading}</span>
          </div>
        </div>` : '';

    const favs = user.favorites.length > 0
      ? `<div class="um-section">
          <div class="um-section-title">Favorite Books</div>
          <div class="um-favs">${user.favorites.map(f => {
            const cover = user.favCovers[f] || '';
            return cover
              ? '<a href="index.html#q=' + encodeURIComponent(f) + '"><img src="' + cover + '" title="' + f + '"></a>'
              : '<span class="fav-chip" style="padding:4px 8px;border:1px solid var(--border);font-size:.85em">' + f + '</span>';
          }).join('')}</div>
        </div>` : '';

    userModalContent.innerHTML = `
      <div style="text-align:center;margin-bottom:14px">
        ${avatar}
        <div class="um-name" style="margin-top:8px">${user.displayName}</div>
      </div>
      <div class="um-stats">
        <div class="um-stat"><div class="um-stat-val">${user.reviewCount}</div><div class="um-stat-lbl">Reviews</div></div>
        <div class="um-stat"><div class="um-stat-val">${user.avgRating}</div><div class="um-stat-lbl">Avg Rating</div></div>
        <div class="um-stat"><div class="um-stat-val">${user.gameBestStreak}</div><div class="um-stat-lbl">Best Streak</div></div>
        <div class="um-stat"><div class="um-stat-val">${user.gameAccuracy}%</div><div class="um-stat-lbl">Game Accuracy</div></div>
        <div class="um-stat"><a href="index.html#list=tbr&user=${encodeURIComponent(user.displayName)}" style="text-decoration:none"><div class="um-stat-val">${user.booksTbr}</div><div class="um-stat-lbl">TBR</div></a></div>
        <div class="um-stat"><div class="um-stat-val">${user.clubs.length}</div><div class="um-stat-lbl">Clubs</div></div>
      </div>
      ${user.readYears.length ? `
        <div class="um-section">
          <div class="um-section-title">Books Read by Year</div>
          <div class="um-years">${user.readYears.map(y =>
            `<span class="um-year"><strong>${y.year}</strong> ${y.books}</span>`).join('')}</div>
        </div>` : ''}
      ${user.clubs.length ? `
        <div class="um-section">
          <div class="um-section-title">Book Clubs</div>
          <div class="um-clubs">${user.clubs.map(c => `
            <a class="um-club" href="club.html?id=${encodeURIComponent(c.id)}">
              ${c.cover ? `<img src="${c.cover}" alt="" onerror="this.remove()">` : `<span class="um-club-emoji">${c.emoji}</span>`}
              <span>${c.name.replace(/</g, '&lt;')}</span>
            </a>`).join('')}</div>
        </div>` : ''}
      ${reading}
      ${favs}
    `;
    userModal.classList.add('open');
  }

  // Click handler for user cards (ignore clicks on cover links)
  grid.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    const card = e.target.closest('.user-card');
    if (!card) return;
    const name = card.dataset.name;
    const user = allUsers.find(u => u.displayName.toLowerCase() === name);
    if (user) openUserModal(user);
  });

  loadCommunity();
</script>
</body>
</html>
