<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Club Read - Audiobook Catalog</title>
<style>
:root{
  --bg:#0a0a12; --bg-2:#12121f;
  --text:#e8e6e3; --muted:#8a8f98;
  --border:#2a2a3a;
  --neon-yellow:#fcee0a;
  --neon-cyan:#05d9e8;
  --neon-magenta:#ff2a6d;
}
*{box-sizing:border-box}
body{
  margin:0; padding:20px;
  font-family:'Rajdhani','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(252,238,10,.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(5,217,232,.03) 0%, transparent 50%);
  min-height:100vh;
}
#wrap{max-width:820px;margin:0 auto}
.nav-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.nav-link{
  display:inline-block;padding:8px 14px;background:var(--bg-2);color:var(--neon-cyan);
  text-decoration:none;border:1px solid var(--border);font-weight:700;font-size:.85em;
  text-transform:uppercase;letter-spacing:.5px;transition:all .2s;cursor:pointer;font-family:inherit;
}
.nav-link:hover{border-color:var(--neon-cyan);box-shadow:0 0 8px rgba(5,217,232,.2)}
.read-header{
  background:var(--bg-2);border:1px solid var(--border);padding:20px;margin-bottom:16px;
  display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
.read-cover{width:90px;height:auto;border:1px solid var(--border);flex-shrink:0}
.read-title{
  color:var(--neon-yellow);text-transform:uppercase;letter-spacing:1px;margin:0 0 4px;
  text-shadow:0 0 10px rgba(252,238,10,.3);font-size:1.35em;font-weight:700;
}
.read-author{color:var(--muted);margin:0 0 10px}
.read-club{font-size:.85em;font-family:'Share Tech Mono',monospace}
.read-club a{color:var(--neon-cyan);text-decoration:none}
.progress-row{
  background:var(--bg-2);border:1px solid var(--border);padding:14px 18px;margin-bottom:16px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.progress-row label{font-size:.85em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.progress-row select{
  padding:7px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-family:inherit;font-size:.95em;
}
.progress-row select:focus{outline:none;border-color:var(--neon-cyan)}
.member-progress{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.mp-chip{
  font-size:.75em;padding:2px 8px;border:1px solid var(--border);color:var(--muted);
  font-family:'Share Tech Mono',monospace;
}
.mp-chip strong{color:var(--neon-cyan);font-weight:700}
details.milestone{
  background:var(--bg-2);border:1px solid var(--border);margin-bottom:10px;
}
details.milestone summary{
  padding:14px 18px;cursor:pointer;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--neon-cyan);list-style:none;display:flex;gap:10px;align-items:center;
}
details.milestone summary::-webkit-details-marker{display:none}
details.milestone summary::before{content:'▸';transition:transform .15s}
details[open].milestone summary::before{transform:rotate(90deg)}
.ms-count{margin-left:auto;font-size:.8em;color:var(--muted);font-family:'Share Tech Mono',monospace;font-weight:400}
.ms-body{padding:0 18px 16px}
.locked{
  background:var(--bg-2);border:1px dashed var(--border);margin-bottom:10px;
  padding:14px 18px;color:var(--muted);display:flex;gap:10px;align-items:center;
}
.locked .ms-count{margin-left:auto}
.comment{padding:10px 0;border-top:1px solid var(--border)}
.comment.reply{margin-left:34px}
.c-head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.c-author{font-weight:700;color:var(--neon-cyan)}
.c-date{font-size:.75em;color:var(--muted);font-family:'Share Tech Mono',monospace}
.c-text{margin:4px 0 6px;white-space:pre-wrap;word-break:break-word}
.c-actions{display:flex;gap:10px}
.c-actions button{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75em;
  text-transform:uppercase;padding:0;font-family:inherit;letter-spacing:.5px;
}
.c-actions button:hover{color:var(--neon-cyan)}
.c-actions button.danger:hover{color:var(--neon-magenta)}
.rx-row{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 6px;align-items:center}
.rx-chip{
  background:var(--bg);border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-size:.8em;padding:2px 8px;font-family:'Share Tech Mono',monospace;
}
button.rx-chip:hover{border-color:var(--neon-yellow)}
.rx-chip.mine{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.rx-picker{display:inline-flex;gap:4px}
.rx-picker button{
  background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:1em;
  padding:2px 6px;
}
.rx-picker button:hover{border-color:var(--neon-cyan)}
.pin-badge{font-size:.72em;color:var(--neon-yellow);text-transform:uppercase;letter-spacing:.5px}
.ch-chip{
  font-size:.72em;color:var(--neon-magenta);border:1px solid var(--neon-magenta);
  padding:1px 6px;font-family:'Share Tech Mono',monospace;
}
.spoiler-box{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);
  background:var(--bg);border:1px dashed var(--border);padding:10px 12px;margin-top:8px;
}
.spoiler-box button{
  background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;
  font-size:.75em;padding:3px 9px;font-family:inherit;text-transform:uppercase;
}
.spoiler-box button:hover{border-color:var(--neon-magenta);color:var(--neon-magenta)}
.ch-tag{
  padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-family:inherit;font-size:.85em;max-width:260px;
}
.ch-tag:focus{outline:none;border-color:var(--neon-cyan)}
.composer{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.composer textarea{
  width:100%;min-height:60px;padding:10px;background:var(--bg);color:var(--text);
  border:1px solid var(--border);font-family:inherit;font-size:.95em;resize:vertical;
}
.composer textarea:focus{outline:none;border-color:var(--neon-cyan)}
.composer-row{display:flex;gap:10px;align-items:center}
.composer button{
  padding:7px 16px;background:var(--neon-cyan);color:#04121a;border:none;font-weight:700;
  cursor:pointer;text-transform:uppercase;font-size:.8em;letter-spacing:.5px;font-family:inherit;
}
.composer button:disabled{opacity:.4;cursor:default}
.char-count{font-size:.75em;color:var(--muted);font-family:'Share Tech Mono',monospace}
.archive-banner{
  padding:12px 16px;border:1px solid var(--neon-yellow);background:var(--bg-2);
  color:var(--neon-yellow);margin-bottom:16px;font-size:.95em;
}
.loading,.empty{text-align:center;padding:30px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.error-box{
  padding:12px 16px;border:1px solid var(--neon-magenta);background:var(--bg-2);
  color:var(--neon-magenta);margin-bottom:16px;
}
.notice{
  padding:10px 14px;border:1px solid var(--border);background:var(--bg-2);
  color:var(--muted);margin-bottom:16px;font-size:.9em;
}
.notice a{color:var(--neon-cyan)}
@media(max-width:600px){
  body{padding:10px}
  .read-header{clip-path:none}
  .member-progress{margin-left:0}
  .comment.reply{margin-left:16px}
}
</style>
</head>
<body>
<div id="wrap">
  <div class="nav-row">
    <a id="back-link" href="clubs.html" class="nav-link">&larr; Club</a>
    <a href="clubs.html" class="nav-link">All Clubs</a>
    <a href="index.html" class="nav-link">Catalog</a>
  </div>
  <div id="content"><div class="loading">Loading discussions...</div></div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getSession, slugifyName } from './identity.js';
  import { getClub, getMembers } from './clubs.js';
  import {
    getRead, getComments, addComment, deleteComment,
    toggleReaction, togglePin, REACTION_EMOJI,
    setProgress, setChapterProgress, getProgressAll,
    isMilestoneLocked, isCommentSpoiler, GENERAL_MILESTONE, MAX_COMMENT_LENGTH,
  } from './club-reads.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDgAblkxzVxl7nFbd7jXOo6PpuNPsJw11Y",
    authDomain: "audiobook-catalog.firebaseapp.com",
    projectId: "audiobook-catalog",
    storageBucket: "audiobook-catalog.firebasestorage.app",
    messagingSenderId: "68492219785",
    appId: "1:68492219785:web:7cbe57dda8712377f0bd58"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const session = getSession();
  const mySlug = session ? slugifyName(session.displayName) : null;
  const params = new URLSearchParams(window.location.search);
  const clubId = params.get('club');
  const readId = params.get('read');
  const contentEl = document.getElementById('content');

  let club = null, read = null, comments = [], progressAll = [], members = [];
  const openSections = new Set([GENERAL_MILESTONE]);
  let replyTo = null; // comment id an inline reply composer is open for
  let reactingTo = null; // comment id with the emoji picker open
  const revealedSpoilers = new Set(); // comment ids the viewer chose to reveal

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  const myRole = () => (members.find(m => m.slug === mySlug) || {}).role || null;
  const isMod = () => ['host', 'moderator'].includes(myRole());
  const myProgress = () => {
    const p = progressAll.find(p => p.slug === mySlug);
    return p ? p.milestonePosition : -1;
  };
  const isArchived = () => read && read.status !== 'active';
  const chapterTitles = () => (read && read.chapterTitles) || [];
  const hasChapters = () => chapterTitles().length > 0;
  const myChapter = () => {
    const p = progressAll.find(p => p.slug === mySlug);
    return p && typeof p.chapterIndex === 'number' ? p.chapterIndex : -1;
  };
  const chLabel = (i) => `Ch ${i + 1}: ${chapterTitles()[i] || ''}`;

  function fmtDate(ts) {
    try { return ts && ts.toDate ? ts.toDate().toLocaleDateString() : ''; } catch { return ''; }
  }

  function commentThreadHtml(milestoneId) {
    const inSection = comments
      .filter(c => (c.milestoneId || GENERAL_MILESTONE) === milestoneId)
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
    const topLevel = inSection.filter(c => !c.parentId)
      .sort((a, b) => (b.isPinned === true) - (a.isPinned === true));
    const repliesFor = id => inSection.filter(c => c.parentId === id);

    const canDelete = c => session && (c.slug === mySlug || isMod());

    const reactionChips = (c) => {
      const reactions = c.reactions || {};
      const chips = Object.entries(reactions).map(([emoji, who]) => {
        const mine = mySlug && who.includes(mySlug);
        return session
          ? `<button class="rx-chip ${mine ? 'mine' : ''}" data-react="${c.id}" data-emoji="${emoji}" title="${escapeHtml(who.join(', '))}">${emoji} ${who.length}</button>`
          : `<span class="rx-chip" title="${escapeHtml(who.join(', '))}">${emoji} ${who.length}</span>`;
      }).join('');
      const picker = reactingTo === c.id
        ? `<span class="rx-picker">${REACTION_EMOJI.map(e =>
            `<button data-react="${c.id}" data-emoji="${e}">${e}</button>`).join('')}</span>`
        : '';
      return chips || picker ? `<div class="rx-row">${chips}${picker}</div>` : '';
    };

    const one = (c, isReply) => {
      const tagged = typeof c.chapterIndex === 'number';
      const spoiler = !isArchived() && hasChapters()
        && isCommentSpoiler(c.chapterIndex, myChapter()) && !revealedSpoilers.has(c.id);
      if (spoiler) {
        return `
          <div class="comment ${isReply ? 'reply' : ''} spoiler-box">
            <span>\ud83d\udd12 Spoiler \u2014 tagged ${escapeHtml(chLabel(c.chapterIndex))} by ${escapeHtml(c.displayName)}</span>
            <button data-reveal="${c.id}">Reveal anyway</button>
          </div>`;
      }
      return `
      <div class="comment ${isReply ? 'reply' : ''}">
        <div class="c-head">
          <span class="c-author">${escapeHtml(c.displayName)}</span>
          <span class="c-date">${fmtDate(c.createdAt)}</span>
          ${tagged && hasChapters() ? `<span class="ch-chip" title="${escapeHtml(chLabel(c.chapterIndex))}">@ Ch ${c.chapterIndex + 1}</span>` : ''}
          ${c.isPinned ? '<span class="pin-badge">\ud83d\udccc pinned</span>' : ''}
        </div>
        <div class="c-text">${escapeHtml(c.text)}</div>
        ${reactionChips(c)}
        <div class="c-actions">
          ${session ? `<button data-react-open="${c.id}">React</button>` : ''}
          ${!isReply && session ? `<button data-reply="${c.id}" data-ms="${escapeHtml(milestoneId)}">Reply</button>` : ''}
          ${!isReply && isMod() ? `<button data-pin="${c.id}">${c.isPinned ? 'Unpin' : 'Pin'}</button>` : ''}
          ${canDelete(c) ? `<button class="danger" data-del="${c.id}">Delete</button>` : ''}
        </div>
        ${replyTo === c.id ? composerHtml(milestoneId, c.id) : ''}
      </div>`;
    };

    const list = topLevel.map(c => one(c, false) + repliesFor(c.id).map(r => one(r, true)).join('')).join('');
    const canCompose = session && (!isArchived() || milestoneId === GENERAL_MILESTONE);
    const footer = canCompose
      ? composerHtml(milestoneId, null)
      : (session ? '' : '<div class="notice">Sign in on the <a href="index.html">catalog page</a> to join the discussion.</div>');
    return (list || '<div class="empty" style="padding:14px">No comments yet — start the discussion!</div>') + footer;
  }

  function composerHtml(milestoneId, parentId) {
    const tagSelect = hasChapters() ? `
          <select class="ch-tag" title="Optional: tag the chapter you're at — readers who aren't there yet see this comment as a spoiler">
            <option value="">No chapter tag</option>
            ${chapterTitles().map((t, i) =>
              `<option value="${i}" ${!parentId && myChapter() === i ? 'selected' : ''}>@ ${escapeHtml(chLabel(i))}</option>`).join('')}
          </select>` : '';
    return `
      <div class="composer" data-composer data-ms="${escapeHtml(milestoneId)}" data-parent="${parentId || ''}">
        <textarea maxlength="${MAX_COMMENT_LENGTH}" placeholder="${parentId ? 'Write a reply...' : 'Add to the discussion...'}"></textarea>
        <div class="composer-row">
          <button data-post>Post</button>${tagSelect}
          <span class="char-count">0 / ${MAX_COMMENT_LENGTH}</span>
        </div>
      </div>`;
  }

  function sectionHtml(id, label, position) {
    const count = comments.filter(c => (c.milestoneId || GENERAL_MILESTONE) === id).length;
    const milestone = read.milestones.find(m => m.id === id);
    const chStart = milestone && typeof milestone.chStart === 'number' ? milestone.chStart : null;
    const locked = !isArchived() && (
      hasChapters()
        ? (chStart !== null && id !== GENERAL_MILESTONE && myChapter() < chStart)
        : isMilestoneLocked(position, myProgress(), id)
    );
    if (locked) {
      return `
        <div class="locked">
          <span>🔒 ${escapeHtml(label)} — ${hasChapters() ? "you haven't reached this yet" : 'update your progress to view'} (spoilers ahead)</span>
          <span class="ms-count">${count} comment${count !== 1 ? 's' : ''}</span>
        </div>`;
    }
    const open = openSections.has(id) ? 'open' : '';
    return `
      <details class="milestone" data-ms-section="${escapeHtml(id)}" ${open}>
        <summary>${escapeHtml(label)}<span class="ms-count">${count} comment${count !== 1 ? 's' : ''}</span></summary>
        <div class="ms-body">${commentThreadHtml(id)}</div>
      </details>`;
  }

  function render() {
    const cover = read.coverHref
      ? `<img class="read-cover" src="${escapeHtml(read.coverHref)}" alt="" onerror="this.remove()">` : '';
    const progressChips = progressAll
      .map(p => {
        let label;
        if (hasChapters()) {
          label = typeof p.chapterIndex === 'number' && p.chapterIndex >= 0
            ? `Ch ${p.chapterIndex + 1}/${chapterTitles().length}`
            : 'Not started';
        } else {
          label = p.milestonePosition >= 0
            ? (read.milestones.find(m => m.position === p.milestonePosition) || {}).label || '?'
            : 'Not started';
        }
        return `<span class="mp-chip"><strong>${escapeHtml(p.displayName)}</strong> ${escapeHtml(label)}</span>`;
      }).join('');

    const options = hasChapters()
      ? [`<option value="-1" ${myChapter() === -1 ? 'selected' : ''}>Not started</option>`]
          .concat(chapterTitles().map((t, i) =>
            `<option value="${i}" ${myChapter() === i ? 'selected' : ''}>${escapeHtml(chLabel(i))}</option>`))
          .join('')
      : [`<option value="-1" ${myProgress() === -1 ? 'selected' : ''}>Not started</option>`]
          .concat(read.milestones.map(m =>
            `<option value="${m.position}" ${myProgress() === m.position ? 'selected' : ''}>${escapeHtml(m.label)}</option>`))
          .join('');

    contentEl.innerHTML = `
      <div class="read-header">
        ${cover}
        <div>
          <h1 class="read-title">${escapeHtml(read.bookTitle)}</h1>
          <p class="read-author">${escapeHtml(read.bookAuthor)}</p>
          <div class="read-club">Read by <a href="club.html?id=${encodeURIComponent(clubId)}">${escapeHtml(club.emoji || '📚')} ${escapeHtml(club.name)}</a></div>
        </div>
      </div>

      ${isArchived() ? `
        <div class="archive-banner">This read is ${escapeHtml(read.status)} — discussions are archived. All sections are open (no spoiler locks); new comments only in General.</div>` : ''}
      ${session && myRole() && !isArchived() ? `
        <div class="progress-row">
          <label for="progress-select">${hasChapters() ? "I'm at:" : "I've finished through:"}</label>
          <select id="progress-select">${options}</select>
          <div class="member-progress">${progressChips}</div>
        </div>` : `
        <div class="progress-row"><div class="member-progress" style="margin-left:0">${progressChips}</div></div>`}

      ${sectionHtml(GENERAL_MILESTONE, 'General (no spoilers)', -1)}
      ${read.milestones.map(m => sectionHtml(m.id, m.label, m.position)).join('')}
    `;
    wireEvents();
  }

  function wireEvents() {
    const sel = document.getElementById('progress-select');
    if (sel) sel.addEventListener('change', async () => {
      const v = parseInt(sel.value, 10);
      const r = hasChapters()
        ? await setChapterProgress(db, clubId, readId, v, session)
        : await setProgress(db, clubId, readId, v, session);
      if (r.success) reload(); else showError(r.error);
    });

    contentEl.querySelectorAll('details[data-ms-section]').forEach(d => {
      d.addEventListener('toggle', () => {
        if (d.open) openSections.add(d.dataset.msSection);
        else openSections.delete(d.dataset.msSection);
      });
    });

    contentEl.querySelectorAll('[data-composer]').forEach(box => {
      const textarea = box.querySelector('textarea');
      const counter = box.querySelector('.char-count');
      textarea.addEventListener('input', () => {
        counter.textContent = `${textarea.value.length} / ${MAX_COMMENT_LENGTH}`;
      });
      box.querySelector('[data-post]').addEventListener('click', async () => {
        const tagEl = box.querySelector('.ch-tag');
        const r = await addComment(db, clubId, readId, {
          milestoneId: box.dataset.ms,
          parentId: box.dataset.parent || null,
          text: textarea.value,
          chapterIndex: tagEl && tagEl.value !== '' ? parseInt(tagEl.value, 10) : null,
        }, session);
        if (r.success) { replyTo = null; reload(); } else showError(r.error);
      });
    });

    contentEl.querySelectorAll('[data-reply]').forEach(btn =>
      btn.addEventListener('click', () => {
        replyTo = replyTo === btn.dataset.reply ? null : btn.dataset.reply;
        openSections.add(btn.dataset.ms);
        render();
      }));

    contentEl.querySelectorAll('[data-del]').forEach(btn =>
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this comment?')) return;
        const r = await deleteComment(db, clubId, readId, btn.dataset.del);
        if (r.success) reload(); else showError(r.error);
      }));

    contentEl.querySelectorAll('[data-react-open]').forEach(btn =>
      btn.addEventListener('click', () => {
        reactingTo = reactingTo === btn.dataset.reactOpen ? null : btn.dataset.reactOpen;
        render();
      }));

    contentEl.querySelectorAll('[data-react]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const r = await toggleReaction(db, clubId, readId, btn.dataset.react, btn.dataset.emoji, session);
        if (r.success) { reactingTo = null; reload(); } else showError(r.error);
      }));

    contentEl.querySelectorAll('[data-reveal]').forEach(btn =>
      btn.addEventListener('click', () => {
        revealedSpoilers.add(btn.dataset.reveal);
        render();
      }));

    contentEl.querySelectorAll('[data-pin]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const r = await togglePin(db, clubId, readId, btn.dataset.pin);
        if (r.success) reload(); else showError(r.error);
      }));
  }

  function showError(msg) {
    const box = document.createElement('div');
    box.className = 'error-box';
    box.textContent = msg;
    contentEl.prepend(box);
    setTimeout(() => box.remove(), 4000);
  }

  async function reload() {
    [club, read, comments, progressAll, members] = await Promise.all([
      getClub(db, clubId),
      getRead(db, clubId, readId),
      getComments(db, clubId, readId),
      getProgressAll(db, clubId, readId),
      getMembers(db, clubId),
    ]);
    if (!club || !read) {
      contentEl.innerHTML = '<div class="empty">Read not found — it may have been removed.</div>';
      return;
    }
    document.getElementById('back-link').href = `club.html?id=${encodeURIComponent(clubId)}`;
    document.title = `${read.bookTitle} - Club Read`;
    render();
  }

  if (!clubId || !readId) {
    contentEl.innerHTML = '<div class="empty">No read specified.</div>';
  } else {
    reload().catch(e => {
      contentEl.innerHTML = '<div class="empty">Failed to load discussions.</div>';
      console.error(e);
    });
  }
</script>
</body>
</html>
