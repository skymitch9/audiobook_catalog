<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("ab_theme")==="light")document.documentElement.classList.add("light");</script>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<title>Club Read - Audiobook Catalog</title>
<style>
:root{
  --bg:#0a0a12; --bg-2:#12121f;
  --text:#e8e6e3; --muted:#8a8f98;
  --border:#2a2a3a;
  --neon-yellow:#fcee0a;
  --neon-cyan:#05d9e8;
  --neon-magenta:#ff2a6d;
}
*{box-sizing:border-box}
body{
  margin:0; padding:20px;
  font-family:'Rajdhani','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--text);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(252,238,10,.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(5,217,232,.03) 0%, transparent 50%);
  min-height:100vh;
}
#wrap{max-width:820px;margin:0 auto}
.nav-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.nav-link{
  display:inline-block;padding:8px 14px;background:var(--bg-2);color:var(--neon-cyan);
  text-decoration:none;border:1px solid var(--border);font-weight:700;font-size:.85em;
  text-transform:uppercase;letter-spacing:.5px;transition:all .2s;cursor:pointer;font-family:inherit;
}
.nav-link:hover{border-color:var(--neon-cyan);box-shadow:0 0 8px rgba(5,217,232,.2)}
.club-back{display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;padding:7px 13px;
  background:var(--bg-2);color:var(--neon-cyan);text-decoration:none;border:1px solid var(--border);
  font-weight:700;font-size:.8em;text-transform:uppercase;letter-spacing:.5px;transition:all .2s}
.club-back:hover{border-color:var(--neon-cyan);box-shadow:0 0 8px rgba(5,217,232,.2)}
.read-header{
  background:var(--bg-2);border:1px solid var(--border);padding:20px;margin-bottom:16px;
  display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
.read-cover{width:90px;height:auto;border:1px solid var(--border);flex-shrink:0}
.read-title{
  color:var(--neon-yellow);text-transform:uppercase;letter-spacing:1px;margin:0 0 4px;
  text-shadow:0 0 10px rgba(252,238,10,.3);font-size:1.35em;font-weight:700;
}
.read-author{color:var(--muted);margin:0 0 10px}
.read-club{font-size:.85em;font-family:'Share Tech Mono',monospace}
.read-club a{color:var(--neon-cyan);text-decoration:none}
.progress-row{
  background:var(--bg-2);border:1px solid var(--border);padding:14px 18px;margin-bottom:16px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.progress-row label{font-size:.85em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.progress-row select{
  padding:7px 10px;background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-family:inherit;font-size:.95em;
}
.progress-row select:focus{outline:none;border-color:var(--neon-cyan)}
.finish-me{
  padding:7px 14px;background:none;border:1px solid var(--neon-yellow);color:var(--neon-yellow);
  cursor:pointer;font-weight:700;text-transform:uppercase;font-size:.75em;letter-spacing:.5px;
  font-family:inherit;
}
.finish-me:hover{background:var(--neon-yellow);color:#141406}
.member-progress{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.mp-chip{
  font-size:.75em;padding:2px 8px;border:1px solid var(--border);color:var(--muted);
  font-family:'Share Tech Mono',monospace;
}
.mp-chip strong{color:var(--neon-cyan);font-weight:700}
.mp-chip.done{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.mp-chip.done strong{color:var(--neon-yellow)}
.mp-chip.ns{opacity:.55}
.mp-chip.me{border-color:var(--neon-cyan)}
details.milestone{
  background:var(--bg-2);border:1px solid var(--border);margin-bottom:10px;
}
details.milestone summary{
  padding:14px 18px;cursor:pointer;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--neon-cyan);list-style:none;display:flex;gap:10px;align-items:center;
}
details.milestone summary::-webkit-details-marker{display:none}
details.milestone summary::before{content:'▸';transition:transform .15s}
details[open].milestone summary::before{transform:rotate(90deg)}
.ms-count{margin-left:auto;font-size:.8em;color:var(--muted);font-family:'Share Tech Mono',monospace;font-weight:400}
.ms-body{padding:0 18px 16px}
.locked{
  background:var(--bg-2);border:1px dashed var(--border);margin-bottom:10px;
  padding:14px 18px;color:var(--muted);display:flex;gap:10px;align-items:center;
}
.locked .ms-count{margin-left:auto}
.comment{padding:10px 0;border-top:1px solid var(--border)}
.comment.reply{margin-left:34px}
.c-head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.c-author{font-weight:700;color:var(--neon-cyan)}
.bot-avatar{
  width:24px;height:24px;border-radius:50%;border:1px solid var(--neon-magenta);
  vertical-align:middle;object-fit:cover;
}
.bot-badge{
  font-size:.7em;padding:1px 6px;border:1px solid var(--neon-magenta);color:var(--neon-magenta);
  font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:.5px;
}
.c-date{font-size:.75em;color:var(--muted);font-family:'Share Tech Mono',monospace}
.c-text{margin:4px 0 6px;white-space:pre-wrap;word-break:break-word}
.c-actions{display:flex;gap:10px}
.c-actions button{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75em;
  text-transform:uppercase;padding:0;font-family:inherit;letter-spacing:.5px;
}
.c-actions button:hover{color:var(--neon-cyan)}
.c-actions button.danger:hover{color:var(--neon-magenta)}
.rx-row{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 6px;align-items:center}
.rx-chip{
  background:var(--bg);border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-size:.8em;padding:2px 8px;font-family:'Share Tech Mono',monospace;
}
button.rx-chip:hover{border-color:var(--neon-yellow)}
.rx-chip.mine{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.rx-picker{display:inline-flex;gap:4px}
.rx-picker button{
  background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:1em;
  padding:2px 6px;
}
.rx-picker button:hover{border-color:var(--neon-cyan)}
.pin-badge{font-size:.72em;color:var(--neon-yellow);text-transform:uppercase;letter-spacing:.5px}
.ch-chip{
  font-size:.72em;color:var(--neon-magenta);border:1px solid var(--neon-magenta);
  padding:1px 6px;font-family:'Share Tech Mono',monospace;
}
.spoiler-box{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--muted);
  background:var(--bg);border:1px dashed var(--border);padding:10px 12px;margin-top:8px;
}
.spoiler-box button{
  background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;
  font-size:.75em;padding:3px 9px;font-family:inherit;text-transform:uppercase;
}
.spoiler-box button:hover{border-color:var(--neon-magenta);color:var(--neon-magenta)}
.ch-tag{
  padding:5px 8px;background:var(--bg);color:var(--text);border:1px solid var(--border);
  font-family:inherit;font-size:.85em;max-width:260px;
}
.ch-tag:focus{outline:none;border-color:var(--neon-cyan)}
.composer{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.composer textarea{
  width:100%;min-height:60px;padding:10px;background:var(--bg);color:var(--text);
  border:1px solid var(--border);font-family:inherit;font-size:.95em;resize:vertical;
}
.composer textarea:focus{outline:none;border-color:var(--neon-cyan)}
.composer-row{display:flex;gap:10px;align-items:center}
.composer button{
  padding:7px 16px;background:var(--neon-cyan);color:#04121a;border:none;font-weight:700;
  cursor:pointer;text-transform:uppercase;font-size:.8em;letter-spacing:.5px;font-family:inherit;
}
.composer button:disabled{opacity:.4;cursor:default}
.char-count{font-size:.75em;color:var(--muted);font-family:'Share Tech Mono',monospace}
.view-switch{display:flex;gap:4px;margin-bottom:10px}
.view-switch .tab{
  padding:8px 16px;background:var(--bg-2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;font-size:.8em;font-family:inherit;
}
.view-switch .tab.active{color:var(--neon-cyan);border-color:var(--neon-cyan)}
.quote-card{background:var(--bg-2);border:1px solid var(--border);padding:16px 18px;margin-bottom:10px}
.quote-card blockquote{margin:0 0 8px;font-size:1.1em;line-height:1.5;font-style:italic}
.quote-meta{display:flex;gap:10px;align-items:center;font-size:.8em;color:var(--muted);font-family:'Share Tech Mono',monospace}
.quote-meta button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1em;text-transform:uppercase;padding:0;font-family:inherit}
.quote-meta button:hover{color:var(--neon-magenta)}
.mention{color:var(--neon-cyan);font-weight:700}
.mention-me{color:var(--neon-yellow)}
.comment.mentions-me{border-left:2px solid var(--neon-yellow);padding-left:10px}
.new-dot{width:8px;height:8px;border-radius:50%;background:var(--neon-yellow);display:inline-block}
.new-count{color:var(--neon-yellow)}
.comment.linked{background:rgba(5,217,232,.07);outline:1px solid var(--neon-cyan);padding:10px}
.cw-notes{
  background:var(--bg-2);border:1px solid var(--border);padding:10px 16px;margin-bottom:16px;
  color:var(--muted);font-size:.92em;
}
.cw-notes summary{cursor:pointer;color:var(--neon-yellow)}
.cw-notes ul{margin:8px 0 2px;padding-left:20px}
.cw-notes a{color:var(--neon-cyan);font-size:.85em}
.cw-by{color:var(--muted);font-size:.85em}
.cw-add-btn{
  margin:8px 0 2px;padding:4px 10px;background:none;border:1px solid var(--border);
  color:var(--muted);cursor:pointer;font-family:inherit;font-size:.8em;
}
.cw-add-btn:hover{border-color:var(--neon-yellow);color:var(--neon-yellow)}
.cw-del{
  background:none;border:none;color:var(--neon-magenta);cursor:pointer;font-size:.85em;padding:0 3px;
}
.starter-q{
  background:var(--bg);border:1px dashed var(--border);padding:10px 12px;margin:10px 0 4px;
  color:var(--muted);display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.starter-q button{
  background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;
  font-size:.72em;padding:3px 9px;font-family:inherit;text-transform:uppercase;
}
.starter-q button:hover{border-color:var(--neon-cyan);color:var(--neon-cyan)}
details.chapters-wrap{border:1px solid var(--border);background:var(--bg);margin-top:14px}
details.chapters-wrap > summary{
  padding:10px 14px;cursor:pointer;color:var(--muted);font-size:.85em;text-transform:uppercase;
  letter-spacing:.5px;list-style:none;display:flex;gap:10px;align-items:center;
}
details.chapters-wrap > summary::-webkit-details-marker{display:none}
details.chapters-wrap > summary::before{content:'▸';transition:transform .15s}
details.chapters-wrap[open] > summary::before{transform:rotate(90deg)}
.chapters-body{padding:0 10px 10px}
details.milestone.ch-section{margin:6px 0;border-color:var(--border)}
details.milestone.ch-section summary{padding:10px 14px;font-size:.85em;color:var(--text)}
.locked-ch{margin:6px 0;padding:10px 14px;font-size:.85em}
.archive-banner{
  padding:12px 16px;border:1px solid var(--neon-yellow);background:var(--bg-2);
  color:var(--neon-yellow);margin-bottom:16px;font-size:.95em;
}
.loading,.empty{text-align:center;padding:30px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.error-box{
  padding:12px 16px;border:1px solid var(--neon-magenta);background:var(--bg-2);
  color:var(--neon-magenta);margin-bottom:16px;
}
.notice{
  padding:10px 14px;border:1px solid var(--border);background:var(--bg-2);
  color:var(--muted);margin-bottom:16px;font-size:.9em;
}
.notice a{color:var(--neon-cyan)}
@media(max-width:600px){
  body{padding:10px}
  .read-header{clip-path:none}
  .member-progress{margin-left:0}
  .comment.reply{margin-left:16px}
}

/* Sign-in / user chip (shared identity bar) */
#identity-bar{margin-left:auto}
.identity-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.identity-bar__greeting{font-weight:700;color:var(--neon-cyan,#05d9e8)}
.identity-bar__google-btn{
  display:inline-flex;align-items:center;padding:8px 14px;border:1px solid var(--border,#2a2a3a);
  background:var(--bg-2,#12121f);color:var(--text,#e8e6e3);font-weight:700;font-size:.85em;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.identity-bar__google-btn:hover{border-color:var(--neon-cyan,#05d9e8)}
.identity-bar__google-btn:disabled{opacity:.6;cursor:wait}
.identity-bar__logout-btn{
  background:none;border:1px solid var(--border,#2a2a3a);color:var(--muted,#8a8f98);cursor:pointer;
  font-size:.75em;padding:4px 10px;font-family:inherit;text-transform:uppercase;letter-spacing:.5px;
}
.identity-bar__logout-btn:hover{border-color:var(--neon-magenta,#ff2a6d);color:var(--neon-magenta,#ff2a6d)}

.nav-link.active{border-color:var(--neon-cyan,#05d9e8);color:var(--neon-yellow,#fcee0a)}

/* Light theme: html.light overrides the palette vars site-wide */
html.light{
  --bg:#eef0f5; --bg-2:#ffffff; --text:#16161e; --muted:#5c6270; --border:#c9cdd9;
  --neon-yellow:#9a7b00; --neon-cyan:#00798f; --neon-magenta:#c31e58;
}
html.light body{background-image:none}
</style>

<div id="wrap">
  <div class="nav-row">
    <a href="index.html" class="nav-link">Catalog</a>

<!-- Rate-this-book modal, shown after a member marks themselves finished -->
<div id="cr-rate-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--bg-2);border:1px solid var(--neon-yellow);max-width:440px;width:100%;padding:20px;position:relative;box-sizing:border-box">
    <button id="cr-rate-close" style="position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:1.4em;line-height:1;cursor:pointer">×</button>
    <h2 style="margin:0 0 4px;color:var(--neon-yellow);text-transform:uppercase;letter-spacing:1px;font-size:1.1em">You finished it! Rate this book</h2>
    <div id="cr-rate-title" style="color:var(--neon-cyan);font-weight:700;margin-bottom:14px"></div>
    <label for="cr-rate-stars" style="display:block;font-size:.8em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Your rating</label>
    <select id="cr-rate-stars" style="width:100%;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);margin-bottom:14px;box-sizing:border-box">
      <option value="5">★★★★★ (5)</option>
      <option value="4.5">4.5</option>
      <option value="4" selected>★★★★ (4)</option>
      <option value="3.5">3.5</option>
      <option value="3">★★★ (3)</option>
      <option value="2.5">2.5</option>
      <option value="2">★★ (2)</option>
      <option value="1.5">1.5</option>
      <option value="1">★ (1)</option>
      <option value="0.5">0.5</option>
    </select>
    <label for="cr-rate-text" style="display:block;font-size:.8em;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Review (optional — posts to the catalog's reviews)</label>
    <textarea id="cr-rate-text" maxlength="1000" rows="3" style="width:100%;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);margin-bottom:12px;box-sizing:border-box;font-family:inherit"></textarea>
    <div id="cr-rate-existing" style="display:none;color:var(--muted);font-size:.85em;margin-bottom:8px"></div>
    <div id="cr-rate-error" style="color:var(--neon-magenta);font-size:.85em;margin-bottom:8px"></div>
    <button id="cr-rate-submit" class="nav-link" style="width:100%;background:var(--neon-cyan);color:#04121a;border:none;font-weight:700">Submit Rating</button>
    <button id="cr-rate-later" class="nav-link" style="width:100%;margin-top:8px">Maybe later</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
  import { getSession, slugifyName} from './identity.js';
  import { mountAccountModal } from './account-modal.js';
  import { getClub, getMembers } from './clubs.js?v=20260707';
  import {
    getRead, getComments, addComment, deleteComment,
    toggleReaction, togglePin, REACTION_EMOJI,
    addQuote, getQuotes, deleteQuote, MAX_QUOTE_LENGTH,
    highlightMentions, mentionsUser, getBookPrompts, getBookWarnings,
    setProgress, setChapterProgress, getProgressAll,
    isMilestoneLocked, isCommentSpoiler, groupChapters, GENERAL_MILESTONE, MAX_COMMENT_LENGTH,
  } from './club-reads.js?v=20260707';
  import { addUserWarning, getUserWarnings, deleteUserWarning } from './user-warnings.js';
  import { markReadSeen } from './club-notify.js';
  import { submitReview, bookIdFromTitle, getReviews } from './reviews.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDgAblkxzVxl7nFbd7jXOo6PpuNPsJw11Y",
    authDomain: "audiobook-catalog.firebaseapp.com",
    projectId: "audiobook-catalog",
    storageBucket: "audiobook-catalog.firebasestorage.app",
    messagingSenderId: "68492219785",
    appId: "1:68492219785:web:7cbe57dda8712377f0bd58"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  mountAccountModal(db, app, document.getElementById('identity-bar'));

  const session = getSession();
  const mySlug = session ? slugifyName(session.displayName) : null;
  const params = new URLSearchParams(window.location.search);
  const clubId = params.get('club');
  const readId = params.get('read');
  const contentEl = document.getElementById('content');

  let club = null, read = null, comments = [], progressAll = [], members = [];
  let quotes = [];
  let bookPrompts = null;   // AI starter questions for hosts (toggleable per club)
  let bookWarnings = null;  // published content warnings with sources
  let userWarnings = [];    // reader-added warnings from this site
  let view = 'discussions'; // 'discussions' | 'quotes'
  let lastSeenTs = 0;       // seconds; comments newer than this get a NEW dot
  let firstRender = true;
  const openSections = new Set([GENERAL_MILESTONE]);
  let replyTo = null; // comment id an inline reply composer is open for
  let reactingTo = null; // comment id with the emoji picker open
  const revealedSpoilers = new Set(); // comment ids the viewer chose to reveal

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  const myRole = () => (members.find(m => m.slug === mySlug) || {}).role || null;
  const isMod = () => ['host', 'moderator'].includes(myRole());
  const myProgress = () => {
    const p = progressAll.find(p => p.slug === mySlug);
    return p ? p.milestonePosition : -1;
  };
  const isArchived = () => read && read.status !== 'active';
  const chapterTitles = () => (read && read.chapterTitles) || [];
  const hasChapters = () => chapterTitles().length > 0;
  const myChapter = () => {
    const p = progressAll.find(p => p.slug === mySlug);
    return p && typeof p.chapterIndex === 'number' ? p.chapterIndex : -1;
  };
  const chLabel = (i) => `Ch ${i + 1}: ${chapterTitles()[i] || ''}`;
  const memberNames = () => members.map(m => m.displayName);
  const seenKey = () => `ab_seen_${clubId}_${readId}`;
  const parts = () => groupChapters(chapterTitles());
  const partIndexForChapter = (ch) => parts().findIndex(g => ch >= g.start && ch <= g.end);

  // Bucket key for a comment on a chapter-based read:
  // 'general' | 'p<partIdx>' (part-level) | 'c<chapterIdx>' (chapter-level).
  // Legacy comments with only a milestoneId map to the part containing the
  // milestone's first chapter.
  function bucketKeyFor(c) {
    if (typeof c.chapterIndex === 'number') return `c${c.chapterIndex}`;
    if (typeof c.partIndex === 'number') return `p${Math.min(c.partIndex, parts().length - 1)}`;
    const msId = c.milestoneId || GENERAL_MILESTONE;
    if (msId !== GENERAL_MILESTONE) {
      const m = read.milestones.find(x => x.id === msId);
      if (m && typeof m.chStart === 'number') return `p${partIndexForChapter(m.chStart)}`;
    }
    return 'general';
  }

  function bucketComments() {
    const map = {};
    for (const c of comments) {
      const key = c.parentId
        ? null // replies attach to their parent's bucket during render
        : bucketKeyFor(c);
      if (key) (map[key] = map[key] || []).push(c);
    }
    return map;
  }
  // Chapter <option>s grouped into <optgroup>s (real Part/Book headings when
  // the titles have them, otherwise chunks of 25) so long books stay usable.
  function chapterOptionsHtml(selectedIndex) {
    const titles = chapterTitles();
    const groups = groupChapters(titles);
    const opt = (i) =>
      `<option value="${i}" ${selectedIndex === i ? 'selected' : ''}>${escapeHtml(chLabel(i))}</option>`;
    if (groups.length <= 1) {
      return titles.map((t, i) => opt(i)).join('');
    }
    return groups.map(g => {
      const opts = [];
      for (let i = g.start; i <= g.end; i++) opts.push(opt(i));
      return `<optgroup label="${escapeHtml(g.label)}">${opts.join('')}</optgroup>`;
    }).join('');
  }

  function fmtDate(ts) {
    try { return ts && ts.toDate ? ts.toDate().toLocaleDateString() : ''; } catch { return ''; }
  }

  function commentThreadHtml(milestoneId, explicitTop, target) {
    const inSection = explicitTop !== undefined ? null : comments
      .filter(c => (c.milestoneId || GENERAL_MILESTONE) === milestoneId)
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
    const topLevel = (explicitTop !== undefined ? [...explicitTop] : inSection.filter(c => !c.parentId))
      .sort((a, b) => (b.isPinned === true) - (a.isPinned === true)
        || (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
    const repliesFor = id => comments.filter(c => c.parentId === id)
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

    const canDelete = c => session && (c.slug === mySlug || isMod());

    const reactionChips = (c) => {
      const reactions = c.reactions || {};
      const chips = Object.entries(reactions).map(([emoji, who]) => {
        const mine = mySlug && who.includes(mySlug);
        return session
          ? `<button class="rx-chip ${mine ? 'mine' : ''}" data-react="${c.id}" data-emoji="${emoji}" title="${escapeHtml(who.join(', '))}">${emoji} ${who.length}</button>`
          : `<span class="rx-chip" title="${escapeHtml(who.join(', '))}">${emoji} ${who.length}</span>`;
      }).join('');
      const picker = reactingTo === c.id
        ? `<span class="rx-picker">${REACTION_EMOJI.map(e =>
            `<button data-react="${c.id}" data-emoji="${e}">${e}</button>`).join('')}</span>`
        : '';
      return chips || picker ? `<div class="rx-row">${chips}${picker}</div>` : '';
    };

    const one = (c, isReply) => {
      const tagged = typeof c.chapterIndex === 'number';
      const spoiler = !isArchived() && hasChapters()
        && isCommentSpoiler(c.chapterIndex, myChapter()) && !revealedSpoilers.has(c.id);
      if (spoiler) {
        return `
          <div class="comment ${isReply ? 'reply' : ''} spoiler-box">
            <span>\ud83d\udd12 Spoiler — tagged ${escapeHtml(chLabel(c.chapterIndex))} by ${escapeHtml(c.displayName)}</span>
            <button data-reveal="${c.id}">Reveal anyway</button>
          </div>`;
      }
      const isNew = (c.createdAt?.seconds || 0) > lastSeenTs && c.slug !== mySlug;
      const mentionsMe = session && mentionsUser(c.text, session.displayName);
      return `
      <div class="comment ${isReply ? 'reply' : ''} ${mentionsMe ? 'mentions-me' : ''}" id="c-${c.id}">
        <div class="c-head">
          ${c.isBot ? '<img class="bot-avatar" src="static/img/gabi.png" alt="GABI">' : ''}
          <span class="c-author">${escapeHtml(c.displayName)}</span>
          ${c.isBot ? '<span class="bot-badge" title="AI starter question">AI</span>' : ''}
          <span class="c-date">${fmtDate(c.createdAt)}</span>
          ${isNew ? '<span class="new-dot" title="New since your last visit"></span>' : ''}
          ${tagged && hasChapters() ? `<span class="ch-chip" title="${escapeHtml(chLabel(c.chapterIndex))}">@ Ch ${c.chapterIndex + 1}</span>` : ''}
          ${c.isPinned ? '<span class="pin-badge">\ud83d\udccc pinned</span>' : ''}
        </div>
        <div class="c-text">${highlightMentions(c.text, memberNames(), session ? session.displayName : null)}</div>
        ${reactionChips(c)}
        <div class="c-actions">
          <button data-link="${c.id}" title="Copy a link to this comment">Link</button>
          ${session ? `<button data-react-open="${c.id}">React</button>` : ''}
          ${!isReply && session ? `<button data-reply="${c.id}" data-ms="${escapeHtml(milestoneId)}">Reply</button>` : ''}
          ${!isReply && isMod() ? `<button data-pin="${c.id}">${c.isPinned ? 'Unpin' : 'Pin'}</button>` : ''}
          ${canDelete(c) ? `<button class="danger" data-del="${c.id}">Delete</button>` : ''}
        </div>
        ${replyTo === c.id ? composerHtml(milestoneId, c.id, hasChapters() ? { part: c.partIndex, chapter: c.chapterIndex } : undefined) : ''}
      </div>`;
    };

    const list = topLevel.map(c => one(c, false) + repliesFor(c.id).map(r => one(r, true)).join('')).join('');
    const canCompose = session && (!isArchived() || milestoneId === GENERAL_MILESTONE);
    const footer = canCompose
      ? composerHtml(milestoneId, null, target)
      : (session ? '' : '<div class="notice">Sign in on the <a href="index.html">catalog page</a> to join the discussion.</div>');
    return (list || '<div class="empty" style="padding:14px">No comments yet — start the discussion!</div>') + footer;
  }

  // One AI starter question per section for hosts/mods (club-toggleable).
  // "Post this" publishes it under the GABI identity, tagged to the whole
  // part (not an individual chapter).
  function starterQuestionHtml(milestoneId, partGroup, partIdx) {
    if (!bookPrompts || !isMod() || isArchived()) return '';
    if (club.promptsEnabled === false) return '';
    if (milestoneId === GENERAL_MILESTONE) return '';
    let matches;
    if (partGroup) {
      matches = bookPrompts.filter(p => p.chapter_index >= partGroup.start && p.chapter_index <= partGroup.end);
    } else {
      const m = read.milestones.find(x => x.id === milestoneId);
      if (!m) return '';
      matches = typeof m.chStart === 'number'
        ? bookPrompts.filter(p => p.chapter_index >= m.chStart && p.chapter_index <= m.chEnd)
        : bookPrompts;
    }
    if (!matches.length) return '';
    const pick = matches[Math.floor(Math.random() * matches.length)];
    return `
      <div class="starter-q">
        \ud83d\udca1 <em>${escapeHtml(pick.question)}</em>
        <button data-use-prompt data-ms-target="${escapeHtml(milestoneId || GENERAL_MILESTONE)}"
          data-part="${typeof partIdx === 'number' ? partIdx : ''}"
          data-q="${escapeHtml(pick.question)}">Post as GABI</button>
      </div>`;
  }

  function composerHtml(milestoneId, parentId, target) {
    // target (chapter-based reads): {part} = part-level, {chapter} = chapter
    // thread, {} = General. The bucket is implicit — no tag dropdown needed.
    const targetAttrs = target !== undefined
      ? ` data-part="${typeof target.part === 'number' ? target.part : ''}" data-chapter="${typeof target.chapter === 'number' ? target.chapter : ''}"`
      : '';
    const tagSelect = (target === undefined && hasChapters()) ? `
          <select class="ch-tag" title="Optional: tag the chapter you're at — readers who aren't there yet see this comment as a spoiler">
            <option value="">No chapter tag</option>
            ${chapterOptionsHtml(!parentId ? myChapter() : -2)}
          </select>` : '';
    const hint = target !== undefined && typeof target.part === 'number' && typeof target.chapter !== 'number'
      ? `<span class="char-count">part-level — no exact chapter needed</span>` : '';
    return `
      <div class="composer" data-composer data-ms="${escapeHtml(milestoneId)}" data-parent="${parentId || ''}"${targetAttrs}>
        <textarea maxlength="${MAX_COMMENT_LENGTH}" placeholder="${parentId ? 'Write a reply...' : 'Add to the discussion...'}"></textarea>
        <div class="composer-row">
          <button data-post>Post</button>${tagSelect}${hint}
          <span class="char-count">0 / ${MAX_COMMENT_LENGTH}</span>
        </div>
      </div>`;
  }

  function sectionHtml(id, label, position) {
    const inSectionAll = comments.filter(c => (c.milestoneId || GENERAL_MILESTONE) === id);
    const count = inSectionAll.length;
    const newCount = inSectionAll.filter(c => (c.createdAt?.seconds || 0) > lastSeenTs && c.slug !== mySlug).length;
    const milestone = read.milestones.find(m => m.id === id);
    const chStart = milestone && typeof milestone.chStart === 'number' ? milestone.chStart : null;
    const locked = !isArchived() && (
      hasChapters()
        ? (chStart !== null && id !== GENERAL_MILESTONE && myChapter() < chStart)
        : isMilestoneLocked(position, myProgress(), id)
    );
    if (locked) {
      return `
        <div class="locked">
          <span>🔒 ${escapeHtml(label)} — ${hasChapters() ? "you haven't reached this yet" : 'update your progress to view'} (spoilers ahead)</span>
          <span class="ms-count">${count} comment${count !== 1 ? 's' : ''}</span>
        </div>`;
    }
    const open = openSections.has(id) ? 'open' : '';
    return `
      <details class="milestone" data-ms-section="${escapeHtml(id)}" ${open}>
        <summary>${escapeHtml(label)}<span class="ms-count">${newCount ? `<span class="new-count">${newCount} new</span> · ` : ''}${count} comment${count !== 1 ? 's' : ''}</span></summary>
        <div class="ms-body">${starterQuestionHtml(id)}${commentThreadHtml(id)}</div>
      </details>`;
  }

  function render() {
    const cover = read.coverHref
      ? `<img class="read-cover" src="${escapeHtml(read.coverHref)}" alt="" onerror="this.remove()">` : '';
    // One chip per club member (not just those who set progress), furthest
    // along first, with an explicit Finished state.
    const lastPos = hasChapters() ? chapterTitles().length - 1
      : (read.milestones.length ? Math.max(...read.milestones.map(m => m.position)) : -1);
    const progressChips = members
      .map(m => {
        const p = progressAll.find(x => x.slug === m.slug);
        let pos = -1, label = 'Not started';
        if (hasChapters()) {
          if (p && typeof p.chapterIndex === 'number' && p.chapterIndex >= 0) {
            pos = Math.min(p.chapterIndex, lastPos);
            label = parts()[partIndexForChapter(pos)].label;
          }
        } else if (p && p.milestonePosition >= 0) {
          pos = p.milestonePosition;
          label = (read.milestones.find(ms => ms.position === pos) || {}).label || '?';
        }
        const done = pos >= 0 && pos >= lastPos;
        if (done) label = 'Finished ✓';
        const name = m.displayName || (p && p.displayName) || m.slug;
        return { name, pos, done, label, me: m.slug === mySlug };
      })
      .sort((a, b) => b.pos - a.pos || a.name.localeCompare(b.name))
      .map(c => `<span class="mp-chip${c.done ? ' done' : c.pos < 0 ? ' ns' : ''}${c.me ? ' me' : ''}"><strong>${escapeHtml(c.name)}</strong> ${escapeHtml(c.label)}</span>`)
      .join('');

    const myPart = myChapter() >= 0 ? partIndexForChapter(Math.min(myChapter(), chapterTitles().length - 1)) : -1;
    const options = hasChapters()
      ? `<option value="-1" ${myChapter() === -1 ? 'selected' : ''}>Not started</option>` + parts().map((g, k) =>
          `<option value="${g.end}" ${myPart === k ? 'selected' : ''}>${escapeHtml(g.label)}</option>`).join('')
      : [`<option value="-1" ${myProgress() === -1 ? 'selected' : ''}>Not started</option>`]
          .concat(read.milestones.map(m =>
            `<option value="${m.position}" ${myProgress() === m.position ? 'selected' : ''}>${escapeHtml(m.label)}</option>`))
          .join('');

    contentEl.innerHTML = `
      <div class="read-header">
        ${cover}
        <div>
          <h1 class="read-title">${escapeHtml(read.bookTitle)}</h1>
          <p class="read-author">${escapeHtml(read.bookAuthor)}</p>
          <div class="read-club">Read by <a href="club.html?id=${encodeURIComponent(clubId)}">${escapeHtml(club.name)}</a></div>
        </div>
      </div>

      ${(bookWarnings || userWarnings.length || session) ? `
        <details class="cw-notes">
          <summary>\u26a0 Content notes (${(bookWarnings || []).length + userWarnings.length})</summary>
          <ul>${(bookWarnings || []).map(w =>
            `<li>${escapeHtml(w.label)} <a href="${escapeHtml(w.source_url)}" target="_blank" rel="noopener">source</a></li>`).join('')}${userWarnings.map(w =>
            `<li>${escapeHtml(w.label)} <span class="cw-by">— added by ${escapeHtml(w.displayName)}</span>${session && (w.displayName || '').toLowerCase() === session.displayName.toLowerCase() ? ` <button class="cw-del" data-cw-del="${escapeHtml(w.id)}" title="Remove your warning">✕</button>` : ''}</li>`).join('')}</ul>
          ${session && !isArchived() ? '<button id="cw-add" class="cw-add-btn">+ Add a warning</button>' : ''}
        </details>` : ''}
      ${isArchived() ? `
        <div class="archive-banner">This read is ${escapeHtml(read.status)} — discussions are archived. All sections are open (no spoiler locks); new comments only in General.</div>` : ''}
      ${session && myRole() && !isArchived() ? `
        <div class="progress-row">
          <label for="progress-select">${hasChapters() ? "I'm in:" : "I've finished through:"}</label>
          <select id="progress-select">${options}</select>
          <button id="finished-btn" class="finish-me" title="Mark the whole book finished">I'm finished ✓</button>
          <div class="member-progress">${progressChips}</div>
        </div>` : `
        <div class="progress-row"><div class="member-progress" style="margin-left:0">${progressChips}</div></div>`}

      <div class="view-switch">
        <button class="tab ${view === 'discussions' ? 'active' : ''}" data-view="discussions">Discussions</button>
        <button class="tab ${view === 'quotes' ? 'active' : ''}" data-view="quotes">Quotes (${quotes.length})</button>
      </div>
      ${view === 'quotes' ? renderQuotes() : (hasChapters() ? renderPartsHierarchy() : `
      ${sectionHtml(GENERAL_MILESTONE, 'General (no spoilers)', -1)}
      ${read.milestones.map(m => sectionHtml(m.id, m.label, m.position)).join('')}`)}
    `;
    wireEvents();
  }

  // Parts are the primary sections; chapters nest inside, expandable —
  // audiobook folks comment at part level, page-number folks drill into
  // the exact chapter.
  function renderPartsHierarchy() {
    const buckets = bucketComments();
    const isNewC = c => (c.createdAt?.seconds || 0) > lastSeenTs && c.slug !== mySlug;
    const titles = chapterTitles();

    const generalTop = buckets['general'] || [];
    const out = [sectionShell('general', 'General (no spoilers)', generalTop,
      commentThreadHtml(GENERAL_MILESTONE, generalTop, {}))];

    parts().forEach((g, k) => {
      const partTop = buckets[`p${k}`] || [];
      const chapterTops = [];
      for (let i = g.start; i <= g.end; i++) chapterTops.push(buckets[`c${i}`] || []);
      const keyOfRoot = (c) => {
        const root = c.parentId ? (comments.find(p => p.id === c.parentId) || c) : c;
        return bucketKeyFor(root);
      };
      const inThisPart = (key) =>
        key === `p${k}` || (key[0] === 'c' && +key.slice(1) >= g.start && +key.slice(1) <= g.end);
      const partAll = comments.filter(c => inThisPart(keyOfRoot(c)));
      const totalCount = partAll.length;
      const newCount = partAll.filter(isNewC).length;

      const locked = !isArchived() && myChapter() < g.start;
      if (locked) {
        out.push(`
          <div class="locked">
            <span>🔒 ${escapeHtml(g.label)} — you haven't reached this yet (spoilers ahead)</span>
            <span class="ms-count">${totalCount} comment${totalCount !== 1 ? 's' : ''}</span>
          </div>`);
        return;
      }

      const chapterSections = chapterTops.map((top, j) => {
        const i = g.start + j;
        const chLocked = !isArchived() && i > myChapter();
        const cCount = top.length;
        if (chLocked) {
          return `
            <div class="locked locked-ch">
              <span>🔒 ${escapeHtml(chLabel(i))}</span>
              <span class="ms-count">${cCount} comment${cCount !== 1 ? 's' : ''}</span>
            </div>`;
        }
        return sectionShell(`c${i}`, chLabel(i), top,
          commentThreadHtml(GENERAL_MILESTONE, top, { chapter: i }), 'ch-section');
      }).join('');

      const chCommentCount = chapterTops.reduce((s, l) => s + l.length, 0);
      const body = `
        ${starterQuestionHtml(null, g, k)}
        ${commentThreadHtml(GENERAL_MILESTONE, partTop, { part: k })}
        <details class="chapters-wrap" ${openSections.has(`pch${k}`) ? 'open' : ''} data-ms-section="pch${k}">
          <summary>Chapters ${g.start + 1}–${g.end + 1}<span class="ms-count">${chCommentCount} chapter comment${chCommentCount !== 1 ? 's' : ''}</span></summary>
          <div class="chapters-body">${chapterSections}</div>
        </details>`;
      out.push(sectionShell(`part${k}`, g.label, null,
        body, '', `${newCount ? `<span class="new-count">${newCount} new</span> · ` : ''}${totalCount} comment${totalCount !== 1 ? 's' : ''}`));
    });
    return out.join('');
  }

  function sectionShell(key, label, topComments, bodyHtml, extraClass = '', countHtml = null) {
    const count = topComments ? topComments.length : 0;
    const counter = countHtml !== null ? countHtml : `${count} comment${count !== 1 ? 's' : ''}`;
    const open = openSections.has(key) ? 'open' : '';
    return `
      <details class="milestone ${extraClass}" data-ms-section="${escapeHtml(key)}" ${open}>
        <summary>${escapeHtml(label)}<span class="ms-count">${counter}</span></summary>
        <div class="ms-body">${bodyHtml}</div>
      </details>`;
  }

  function renderQuotes() {
    const canDeleteQuote = q => session && (q.slug === mySlug || isMod());
    const cards = quotes.map(q => {
      const spoiler = !isArchived() && hasChapters()
        && isCommentSpoiler(q.chapterIndex, myChapter()) && !revealedSpoilers.has(q.id);
      if (spoiler) {
        return `
          <div class="quote-card spoiler-box">
            <span>\ud83d\udd12 Spoiler quote — tagged ${escapeHtml(chLabel(q.chapterIndex))}, saved by ${escapeHtml(q.displayName)}</span>
            <button data-reveal="${q.id}">Reveal anyway</button>
          </div>`;
      }
      return `
        <div class="quote-card">
          <blockquote>\u201c${escapeHtml(q.text)}\u201d</blockquote>
          <div class="quote-meta">
            ${typeof q.chapterIndex === 'number' ? `<span class="ch-chip">@ Ch ${q.chapterIndex + 1}</span>` : ''}
            <span>saved by ${escapeHtml(q.displayName)}</span>
            ${canDeleteQuote(q) ? `<button class="danger" data-quote-del="${q.id}">Delete</button>` : ''}
          </div>
        </div>`;
    }).join('');
    const composer = session && myRole() && !isArchived() ? `
      <div class="composer" id="quote-composer">
        <textarea id="quote-text" maxlength="${MAX_QUOTE_LENGTH}" placeholder="A line worth keeping..."></textarea>
        <div class="composer-row">
          <button id="quote-save">Save Quote</button>
          ${hasChapters() ? `<select class="ch-tag" id="quote-tag"><option value="">No chapter tag</option>${chapterOptionsHtml(myChapter())}</select>` : ''}
        </div>
      </div>` : '';
    return `
      ${cards || '<div class="empty">No quotes saved yet — drop the lines that hit.</div>'}
      ${composer}
    `;
  }

  function wireEvents() {
    const cwAdd = document.getElementById('cw-add');
    if (cwAdd) cwAdd.addEventListener('click', async () => {
      const label = prompt('What should readers know going in? (e.g. "Animal death", "Gore")');
      if (label === null) return;
      const r = await addUserWarning(db, read.bookTitle, label, session);
      if (r.success) reload(); else showError(r.error);
    });

    contentEl.querySelectorAll('[data-cw-del]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const w = userWarnings.find(x => x.id === btn.dataset.cwDel);
        if (!w) return;
        const r = await deleteUserWarning(db, w, session);
        if (r.success) reload(); else showError(r.error);
      }));

    contentEl.querySelectorAll('[data-use-prompt]').forEach(btn =>
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        const r = await addComment(db, clubId, readId, {
          milestoneId: btn.dataset.msTarget || GENERAL_MILESTONE,
          text: btn.dataset.q,
          partIndex: btn.dataset.part !== '' ? parseInt(btn.dataset.part, 10) : null,
          asBot: true,
        }, session);
        if (r.success) reload();
        else { btn.disabled = false; showError(r.error); }
      }));

    contentEl.querySelectorAll('[data-view]').forEach(btn =>
      btn.addEventListener('click', () => { view = btn.dataset.view; render(); }));

    contentEl.querySelectorAll('[data-link]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const url = `${location.origin}${location.pathname}?club=${encodeURIComponent(clubId)}&read=${encodeURIComponent(readId)}#c-${btn.dataset.link}`;
        try { await navigator.clipboard.writeText(url); btn.textContent = 'Copied!'; } catch { prompt('Copy link:', url); }
        setTimeout(() => { btn.textContent = 'Link'; }, 1500);
      }));

    const quoteSave = document.getElementById('quote-save');
    if (quoteSave) quoteSave.addEventListener('click', async () => {
      const tagEl = document.getElementById('quote-tag');
      const r = await addQuote(db, clubId, readId, {
        text: document.getElementById('quote-text').value,
        chapterIndex: tagEl && tagEl.value !== '' ? parseInt(tagEl.value, 10) : null,
      }, session);
      if (r.success) reload(); else showError(r.error);
    });

    contentEl.querySelectorAll('[data-quote-del]').forEach(btn =>
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this quote?')) return;
        const r = await deleteQuote(db, clubId, readId, btn.dataset.quoteDel);
        if (r.success) reload(); else showError(r.error);
      }));

    const finishedBtn = document.getElementById('finished-btn');
    if (finishedBtn) finishedBtn.addEventListener('click', async () => {
      if (!confirm(`Mark yourself FINISHED with "${read.bookTitle}"?\n\nThis unlocks every chapter section and every spoiler-tagged comment — only click Yes if you've really finished the book.`)) return;
      const last = hasChapters() ? chapterTitles().length - 1
        : Math.max(...read.milestones.map(m => m.position));
      // Pass finished:true so the club page can nudge me (and others) to rate.
      const r = hasChapters()
        ? await setChapterProgress(db, clubId, readId, last, session, true)
        : await setProgress(db, clubId, readId, last, session, true);
      if (r.success) { await openRateModal(); reload(); } else showError(r.error);
    });

    const sel = document.getElementById('progress-select');
    if (sel) sel.addEventListener('change', async () => {
      const v = parseInt(sel.value, 10);
      const r = hasChapters()
        ? await setChapterProgress(db, clubId, readId, v, session)
        : await setProgress(db, clubId, readId, v, session);
      if (r.success) reload(); else showError(r.error);
    });

    contentEl.querySelectorAll('details[data-ms-section]').forEach(d => {
      d.addEventListener('toggle', () => {
        if (d.open) openSections.add(d.dataset.msSection);
        else openSections.delete(d.dataset.msSection);
      });
    });

    contentEl.querySelectorAll('[data-composer]').forEach(box => {
      const textarea = box.querySelector('textarea');
      const counter = box.querySelector('.char-count');
      textarea.addEventListener('input', () => {
        counter.textContent = `${textarea.value.length} / ${MAX_COMMENT_LENGTH}`;
      });
      box.querySelector('[data-post]').addEventListener('click', async () => {
        const tagEl = box.querySelector('.ch-tag');
        let chapterIndex = tagEl && tagEl.value !== '' ? parseInt(tagEl.value, 10) : null;
        let partIndex = null;
        if (box.dataset.chapter !== undefined && box.dataset.chapter !== '') chapterIndex = parseInt(box.dataset.chapter, 10);
        if (box.dataset.part !== undefined && box.dataset.part !== '' && chapterIndex === null) partIndex = parseInt(box.dataset.part, 10);
        const r = await addComment(db, clubId, readId, {
          milestoneId: box.dataset.ms,
          parentId: box.dataset.parent || null,
          text: textarea.value,
          chapterIndex,
          partIndex,
        }, session);
        if (r.success) { replyTo = null; reload(); } else showError(r.error);
      });
    });

    contentEl.querySelectorAll('[data-reply]').forEach(btn =>
      btn.addEventListener('click', () => {
        replyTo = replyTo === btn.dataset.reply ? null : btn.dataset.reply;
        openSections.add(btn.dataset.ms);
        render();
      }));

    contentEl.querySelectorAll('[data-del]').forEach(btn =>
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this comment?')) return;
        const r = await deleteComment(db, clubId, readId, btn.dataset.del);
        if (r.success) reload(); else showError(r.error);
      }));

    contentEl.querySelectorAll('[data-react-open]').forEach(btn =>
      btn.addEventListener('click', () => {
        reactingTo = reactingTo === btn.dataset.reactOpen ? null : btn.dataset.reactOpen;
        render();
      }));

    contentEl.querySelectorAll('[data-react]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const r = await toggleReaction(db, clubId, readId, btn.dataset.react, btn.dataset.emoji, session);
        if (r.success) { reactingTo = null; reload(); } else showError(r.error);
      }));

    contentEl.querySelectorAll('[data-reveal]').forEach(btn =>
      btn.addEventListener('click', () => {
        revealedSpoilers.add(btn.dataset.reveal);
        render();
      }));

    contentEl.querySelectorAll('[data-pin]').forEach(btn =>
      btn.addEventListener('click', async () => {
        const r = await togglePin(db, clubId, readId, btn.dataset.pin);
        if (r.success) reload(); else showError(r.error);
      }));
  }

  function showError(msg) {
    const box = document.createElement('div');
    box.className = 'error-box';
    box.textContent = msg;
    contentEl.prepend(box);
    setTimeout(() => box.remove(), 4000);
  }

  async function reload() {
    [club, read, comments, progressAll, members, quotes] = await Promise.all([
      getClub(db, clubId),
      getRead(db, clubId, readId),
      getComments(db, clubId, readId),
      getProgressAll(db, clubId, readId),
      getMembers(db, clubId),
      getQuotes(db, clubId, readId),
    ]);
    [bookPrompts, bookWarnings, userWarnings] = await Promise.all([
      getBookPrompts(read ? read.bookTitle : ''),
      getBookWarnings(read ? read.bookTitle : ''),
      read ? getUserWarnings(db, read.bookTitle).catch(() => []) : [],
    ]);
    if (!club || !read) {
      contentEl.innerHTML = '<div class="empty">Read not found — it may have been removed.</div>';
      return;
    }
    markReadSeen(db, mySlug, clubId, readId, read.commentCount || comments.length);
    const backLink = document.getElementById('back-link');
    backLink.href = `club.html?id=${encodeURIComponent(clubId)}`;
    backLink.textContent = `← ${club.name}`;
    document.title = `${read.bookTitle} - Club Read`;
    if (firstRender) {
      lastSeenTs = parseInt(localStorage.getItem(seenKey()) || '0', 10);
      localStorage.setItem(seenKey(), String(Math.floor(Date.now() / 1000)));
      const hash = location.hash.match(/^#c-(.+)$/);
      if (hash) {
        const target = comments.find(c => c.id === hash[1]);
        if (target) {
          if (hasChapters()) {
            const root = target.parentId ? comments.find(p => p.id === target.parentId) || target : target;
            const key = bucketKeyFor(root);
            if (key.startsWith('c')) {
              const pk = partIndexForChapter(+key.slice(1));
              openSections.add(`part${pk}`).add(`pch${pk}`).add(key);
            } else if (key.startsWith('p')) {
              openSections.add(`part${key.slice(1)}`);
            } else openSections.add('general');
          } else {
            openSections.add(target.milestoneId || GENERAL_MILESTONE);
          }
        }
      }
    }
    render();
    if (firstRender) {
      firstRender = false;
      const el = location.hash.startsWith('#c-') ? document.getElementById(location.hash.slice(1)) : null;
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('linked');
      }
    }
  }

  // --- Rate-this-book modal (opens after "I'm finished") ------------------
  async function openRateModal() {
    const modal = document.getElementById('cr-rate-modal');
    if (!modal || !read || !session) return;
    document.getElementById('cr-rate-title').textContent = read.bookTitle;
    document.getElementById('cr-rate-error').textContent = '';
    const bookId = bookIdFromTitle(read.bookTitle);
    let mine = null;
    try {
      const revs = await getReviews(db, bookId);
      mine = revs.find(r => (r.displayName || '').toLowerCase() === session.displayName.toLowerCase());
    } catch {}
    const existing = document.getElementById('cr-rate-existing');
    if (mine) {
      existing.style.display = 'block';
      existing.textContent = `You already rated this ${mine.rating}★ — update it below or keep it.`;
      document.getElementById('cr-rate-stars').value = String(mine.rating);
      document.getElementById('cr-rate-text').value = mine.text || '';
      document.getElementById('cr-rate-submit').textContent = 'Update Review';
    } else {
      existing.style.display = 'none';
      document.getElementById('cr-rate-stars').value = '4';
      document.getElementById('cr-rate-text').value = '';
      document.getElementById('cr-rate-submit').textContent = 'Submit Rating';
    }
    modal.style.display = 'flex';
  }

  (function wireRateModal() {
    const modal = document.getElementById('cr-rate-modal');
    if (!modal) return;
    const close = () => { modal.style.display = 'none'; };
    document.getElementById('cr-rate-close').addEventListener('click', close);
    document.getElementById('cr-rate-later').addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    document.getElementById('cr-rate-submit').addEventListener('click', async () => {
      if (!read || !session) return;
      const errEl = document.getElementById('cr-rate-error');
      errEl.textContent = '';
      const rating = parseFloat(document.getElementById('cr-rate-stars').value);
      const text = document.getElementById('cr-rate-text').value.trim();
      const res = await submitReview(db, bookIdFromTitle(read.bookTitle), session.displayName, rating, text);
      if (res.success) close(); else errEl.textContent = res.error || 'Could not save review.';
    });
  })();

  if (!clubId || !readId) {
    contentEl.innerHTML = '<div class="empty">No read specified.</div>';
  } else {
    reload().catch(e => {
      contentEl.innerHTML = '<div class="empty">Failed to load discussions.</div>';
      console.error(e);
    });
  }
</script>
</body>
</html>
