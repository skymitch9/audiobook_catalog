name: Club Discord Notifications

# Posts new book-club comments to Discord using the existing webhook secret.
# The client never sees the webhook URL, so visitors can't spam the channel.
# Runs every 15 minutes; the notifier looks back 16 minutes (slight overlap —
# a rare duplicate ping is harmless, a gap would lose comments).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: "club-notify"
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 💬 Post new comments to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python -m app.tools.club_discord_notify
