name: Deploy to GitHub Pages

# Two-lane deploy:
#   - Site root (prod) is ALWAYS built from the `prod` branch. Humans never push
#     to `prod`; it only moves via the "Promote to Prod" workflow (promote.yml),
#     which runs guard checks first.
#   - /dev/ is built from `main` on every push, so main can break freely without
#     affecting prod.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger; promote.yml dispatches this after moving `prod`
    inputs:
      notify:
        description: 'Run new-book detection + Discord notification (set by promote.yml)'
        type: boolean
        default: false

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Run tests first
  test:
    uses: ./.github/workflows/tests.yml

  # Run linting
  lint:
    uses: ./.github/workflows/lint.yml

  # Build only if tests and lint pass
  build:
    needs: [test, lint]
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout prod branch (site root)
      uses: actions/checkout@v5
      with:
        ref: prod
        path: prod-src

    - name: 📥 Checkout main branch (dev lane)
      uses: actions/checkout@v5
      with:
        ref: main
        path: main-src

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Install dependencies
      run: |
        echo "::group::Installing Python packages"
        python -m pip install --upgrade pip
        pip install -r main-src/requirements.txt
        echo "::endgroup::"

    - name: 📊 Generate catalog (dev lane)
      working-directory: main-src
      run: |
        echo "::group::Generating audiobook catalog"
        python -m app.main
        echo "::endgroup::"
      continue-on-error: true
      # Continue even if catalog generation fails (no library in CI);
      # the committed site/ contents are what ship.

    - name: 🛡️ Guard prod content
      # Hard fail — never deploy a missing or placeholder prod site.
      # (Promote.yml runs the full guard suite; this is defense in depth.)
      run: |
        if [ ! -f "prod-src/site/index.html" ]; then
          echo "::error::prod branch has no site/index.html — refusing to deploy"
          exit 1
        fi
        if grep -q "This is a placeholder page" prod-src/site/index.html; then
          echo "::error::prod site/index.html is a placeholder — refusing to deploy"
          exit 1
        fi
        if [ ! -f "prod-src/site/catalog.csv" ]; then
          echo "::error::prod branch has no site/catalog.csv — refusing to deploy"
          exit 1
        fi
        echo "✓ prod content looks sane"

    - name: 🛡️ Guard dev content
      run: |
        if [ ! -f "main-src/site/index.html" ]; then
          echo "::error::main branch has no site/index.html — dev lane is broken (check .gitignore?)"
          exit 1
        fi
        echo "✓ dev content present"

    - name: 🧩 Assemble two-lane artifact
      run: |
        echo "::group::Assembling site (root=prod, /dev=main)"
        mkdir -p _site
        cp -r prod-src/site/. _site/
        rm -rf _site/dev
        mkdir -p _site/dev
        cp -r main-src/site/. _site/dev/
        echo "Root files:  $(find _site -maxdepth 1 -type f | wc -l)"
        echo "Dev files:   $(find _site/dev -maxdepth 1 -type f | wc -l)"
        echo "Total size:  $(du -sh _site | cut -f1)"
        echo "::endgroup::"

    - name: 📄 Setup Pages
      uses: actions/configure-pages@v5

    - name: 📦 Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './_site'

    - name: ✅ Build summary
      run: |
        echo "::notice::Two-lane site built (root=prod branch, /dev/=main branch)"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      continue-on-error: true

    - name: 🔁 Retry deploy (Pages transient "try again later" errors)
      id: deployment_retry
      if: steps.deployment.outcome == 'failure'
      uses: actions/deploy-pages@v5

    - name: ✅ Deployment summary
      run: |
        echo "::notice::Deployment completed successfully"
        echo "::notice::Prod URL: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}"
        echo "::notice::Dev URL:  ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}dev/"

    # ---- New-book notification: only when promote.yml dispatched us ----

    - name: 📥 Checkout code
      if: github.event_name == 'workflow_dispatch' && inputs.notify
      uses: actions/checkout@v5
      with:
        fetch-depth: 2  # Fetch last 2 commits to compare

    - name: 🐍 Set up Python
      if: github.event_name == 'workflow_dispatch' && inputs.notify
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Install dependencies
      if: github.event_name == 'workflow_dispatch' && inputs.notify
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔍 Detect new books
      if: github.event_name == 'workflow_dispatch' && inputs.notify
      id: detect_books
      run: |
        python -m app.tools.detect_new_books
      continue-on-error: true

    - name: 📢 Notify Discord
      if: github.event_name == 'workflow_dispatch' && inputs.notify && steps.detect_books.outputs.has_new_books == 'true'
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        SITE_URL: ${{ steps.deployment.outputs.page_url }}
      run: |
        python -m app.tools.send_discord_notification

    - name: 💾 Save catalog snapshot
      if: github.event_name == 'workflow_dispatch' && inputs.notify && steps.detect_books.outputs.has_new_books == 'true'
      run: |
        python -m app.tools.detect_new_books --update-snapshot
        if [ -f "last_catalog_snapshot.json" ]; then
          git config user.email "nbaslamking@gmail.com"
          git config user.name "BookBuddy Bot"
          git add last_catalog_snapshot.json
          git diff --cached --quiet || git commit -m "chore: Update catalog snapshot [skip ci]"
          git push || true
        fi
